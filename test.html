<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CORS Test</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 720px;
      margin: 40px auto;
      line-height: 1.6;
    }

    button {
      margin-right: 12px;
      margin-bottom: 12px;
      padding: 10px 16px;
      cursor: pointer;
    }

    pre {
      background: #f5f5f5;
      padding: 16px;
      border-radius: 8px;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>

<body>
  <h1>CORS Test Page</h1>
  <p>Frontend: <code>http://localhost:5500</code></p>
  <p>Backend: <code>http://localhost:3000</code></p>

  <button id="getBtn">GET /users</button>
  <button id="postBtn">POST /users</button>
  <button id="getByIdBtn">GET current user</button>
  <button id="putBtn">PUT current user</button>
  <button id="deleteBtn">DELETE current user</button>

  <pre id="result">Waiting...</pre>

  <script>
    const result = document.getElementById('result')
    const API_BASE = 'http://localhost:3000'
    let currentUserId = null

    function show(data) {
      result.textContent =
        typeof data === 'string' ? data : JSON.stringify(data, null, 2)
    }

    function requireCurrentUser() {
      if (currentUserId) {
        return true
      }

      show('Please click POST /users first')
      return false
    }

    document.getElementById('getBtn').onclick = async () => {
      try {
        const res = await fetch(`${API_BASE}/users`)
        const data = await res.json()

        show({
          type: 'GET /users',
          ok: res.ok,
          status: res.status,
          body: data
        })
      } catch (err) {
        show('GET /users failed: ' + err.message)
      }
    }

    document.getElementById('postBtn').onclick = async () => {
      try {
        const res = await fetch(`${API_BASE}/users`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            name: 'test user',
            age: 22
          })
        })

        const data = await res.json()

        if (data.data && data.data.id) {
          currentUserId = data.data.id
        }

        show({
          type: 'POST /users',
          ok: res.ok,
          status: res.status,
          currentUserId,
          body: data
        })
      } catch (err) {
        show('POST /users failed: ' + err.message)
      }
    }

    document.getElementById('getByIdBtn').onclick = async () => {
      if (!requireCurrentUser()) {
        return
      }

      try {
        const res = await fetch(`${API_BASE}/users/${currentUserId}`)
        const data = await res.json()

        show({
          type: `GET /users/${currentUserId}`,
          ok: res.ok,
          status: res.status,
          body: data
        })
      } catch (err) {
        show('GET current user failed: ' + err.message)
      }
    }

    document.getElementById('putBtn').onclick = async () => {
      if (!requireCurrentUser()) {
        return
      }

      try {
        const res = await fetch(`${API_BASE}/users/${currentUserId}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            name: 'updated user',
            age: 23
          })
        })

        const data = await res.json()

        show({
          type: `PUT /users/${currentUserId}`,
          ok: res.ok,
          status: res.status,
          body: data
        })
      } catch (err) {
        show('PUT current user failed: ' + err.message)
      }
    }

    document.getElementById('deleteBtn').onclick = async () => {
      if (!requireCurrentUser()) {
        return
      }

      try {
        const deleteId = currentUserId
        const res = await fetch(`${API_BASE}/users/${deleteId}`, {
          method: 'DELETE'
        })

        const data = await res.json()

        if (res.ok) {
          currentUserId = null
        }

        show({
          type: `DELETE /users/${deleteId}`,
          ok: res.ok,
          status: res.status,
          currentUserId,
          body: data
        })
      } catch (err) {
        show('DELETE current user failed: ' + err.message)
      }
    }
  </script>
</body>

</html>
